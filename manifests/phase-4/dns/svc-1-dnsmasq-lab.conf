# /etc/dnsmasq.d/lab.conf
# Lab DNS authority — Phase 4
# Owner: Tuhin · Created: 2026-04-25
#
# This is the canonical source of truth for the homelab `lab` zone.
# Deployed to svc-1 (10.10.0.50) at /etc/dnsmasq.d/lab.conf.
# Any change here MUST be committed before being applied to the host.
#
# To apply changes:
#   scp manifests/phase-4/dns/svc-1-dnsmasq-lab.conf tuhin@10.10.0.50:/tmp/lab.conf
#   ssh tuhin@10.10.0.50
#   sudo mv /tmp/lab.conf /etc/dnsmasq.d/lab.conf
#   sudo dnsmasq --test --conf-file=/etc/dnsmasq.conf
#   sudo systemctl restart dnsmasq

# ---- Listening ----
# Bind explicitly to lab interface and loopback only.
# Never 0.0.0.0 — security: avoid open resolver on management LAN.
listen-address=10.10.0.50,127.0.0.1
bind-interfaces

# ---- Authority for `lab` zone ----
# `local=/lab/` makes dnsmasq authoritative for `lab` — never forwards
# `lab.` queries upstream. Unknown `*.lab` returns NXDOMAIN unless matched.
local=/lab/

# Don't read /etc/hosts (it's for svc-1's own hostname only)
no-hosts

# ---- Explicit A records (first-class) ----
# Direct hosts (not via ingress)
address=/gitlab.lab/10.10.0.30
address=/pve.lab/192.168.68.200
address=/cp.lab/10.10.0.10
address=/svc.lab/10.10.0.50
address=/worker-1.lab/10.10.0.21
address=/worker-2.lab/10.10.0.22
address=/worker-3.lab/10.10.0.23
address=/ci.lab/10.10.0.30

# Cluster ingress (MetalLB IP, via ingress-nginx)
address=/grafana.lab/10.10.0.200
address=/argocd.lab/10.10.0.200
address=/prometheus.lab/10.10.0.200
address=/longhorn.lab/10.10.0.200

# ---- Wildcard fallback (lowest priority) ----
# Anything else under .lab routed to ingress.
# Specific addresses above override this for matching names.
address=/.lab/10.10.0.200

# ---- Upstream forwarders for everything else ----
# Used for non-`.lab` queries. Strict order — Cloudflare first, Google fallback.
no-resolv
server=1.1.1.1
server=8.8.8.8

# ---- Cache + logging ----
cache-size=1000
log-queries
log-facility=/var/log/dnsmasq.log