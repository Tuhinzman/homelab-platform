#!/usr/sbin/nft -f

# Do NOT use `flush ruleset` — would wipe Tailscale's rules.
# Only flush our own tables before re-adding.
table inet homelab_filter
delete table inet homelab_filter

table ip homelab_nat
delete table ip homelab_nat

table inet homelab_filter {
    chain forward {
        type filter hook forward priority filter; policy accept;

        # Lab → internet (new + return)
        iifname "vmbr1" oifname "vmbr0" accept

        # Tailscale admin → lab (explicit access)
        iifname "tailscale0" oifname "vmbr1" accept

        # Home → lab: stateful return only
        iifname "vmbr0" oifname "vmbr1" ct state related,established accept
    }
}

table ip homelab_nat {
    chain postrouting {
        type nat hook postrouting priority srcnat; policy accept;

        # MASQUERADE lab → internet
        ip saddr 10.10.0.0/24 oifname "vmbr0" masquerade
    }
}
