<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 680 560" role="img" aria-labelledby="t d">
  <title id="t">Request traffic path from user to pod</title>
  <desc id="d">User on Mac or remote via Tailscale hits a MetalLB LoadBalancer IP in the range 10.10.0.200 to 10.10.0.220, advertised to the lab network via L2 ARP. Traffic arrives at ingress-nginx on k8s-worker-3 which terminates TLS using cert-manager certificates and routes HTTP to a Kubernetes Service. The ClusterIP uses kube-proxy iptables rules to load-balance to matching pods. The pod runs on k8s-worker-1 or k8s-worker-2.</desc>
  <style>
    text { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; }
    .t  { font-size: 14px; fill: #3d3d3a; }
    .ts { font-size: 12px; fill: #73726c; }
    .th { font-size: 14px; font-weight: 500; fill: #3d3d3a; }
    .arr { stroke: #73726c; stroke-width: 1.5; fill: none; }
    .c-gray   > rect { fill: #F1EFE8; stroke: #5F5E5A; }
    .c-gray   > text.th { fill: #444441; }
    .c-gray   > text.ts { fill: #5F5E5A; }
    .c-blue   > rect { fill: #E6F1FB; stroke: #185FA5; }
    .c-blue   > text.th { fill: #0C447C; }
    .c-blue   > text.ts { fill: #185FA5; }
    .c-purple > rect { fill: #EEEDFE; stroke: #534AB7; }
    .c-purple > text.th { fill: #3C3489; }
    .c-purple > text.ts { fill: #534AB7; }
  </style>
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
  </defs>

  <g class="c-gray">
    <rect x="260" y="30" width="160" height="50" rx="8" stroke-width="0.5"/>
    <text class="th" x="340" y="50" text-anchor="middle" dominant-baseline="central">User</text>
    <text class="ts" x="340" y="68" text-anchor="middle" dominant-baseline="central">LAN or Tailscale</text>
  </g>

  <line x1="340" y1="80" x2="340" y2="148" class="arr" marker-end="url(#arrow)"/>

  <rect x="100" y="110" width="480" height="420" rx="12" stroke="#B4B2A9" stroke-width="0.8" stroke-dasharray="5 4" fill="none"/>
  <text class="th" x="118" y="130" dominant-baseline="central" fill="#3d3d3a">Kubernetes cluster</text>

  <g class="c-blue">
    <rect x="220" y="150" width="240" height="60" rx="8" stroke-width="0.5"/>
    <text class="th" x="340" y="170" text-anchor="middle" dominant-baseline="central">MetalLB</text>
    <text class="ts" x="340" y="190" text-anchor="middle" dominant-baseline="central">L2 mode · 10.10.0.200–220</text>
  </g>

  <line x1="340" y1="210" x2="340" y2="250" class="arr" marker-end="url(#arrow)"/>

  <g class="c-blue">
    <rect x="220" y="250" width="240" height="60" rx="8" stroke-width="0.5"/>
    <text class="th" x="340" y="270" text-anchor="middle" dominant-baseline="central">ingress-nginx</text>
    <text class="ts" x="340" y="290" text-anchor="middle" dominant-baseline="central">on worker-3 · TLS termination</text>
  </g>

  <line x1="340" y1="310" x2="340" y2="350" class="arr" marker-end="url(#arrow)"/>

  <g class="c-blue">
    <rect x="220" y="350" width="240" height="60" rx="8" stroke-width="0.5"/>
    <text class="th" x="340" y="370" text-anchor="middle" dominant-baseline="central">Kubernetes Service</text>
    <text class="ts" x="340" y="390" text-anchor="middle" dominant-baseline="central">ClusterIP via kube-proxy</text>
  </g>

  <line x1="340" y1="410" x2="340" y2="450" class="arr" marker-end="url(#arrow)"/>

  <g class="c-purple">
    <rect x="220" y="450" width="240" height="60" rx="8" stroke-width="0.5"/>
    <text class="th" x="340" y="470" text-anchor="middle" dominant-baseline="central">Pod</text>
    <text class="ts" x="340" y="490" text-anchor="middle" dominant-baseline="central">on worker-1 or worker-2</text>
  </g>
</svg>
