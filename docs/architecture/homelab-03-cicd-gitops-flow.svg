<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 680 580" role="img" aria-labelledby="t d">
  <title id="t">CI/CD and GitOps flow for the homelab</title>
  <desc id="d">Developer on Mac pushes code to GitLab on ci-1. GitLab CI builds the image, runs Trivy scan, and on pass pushes two outputs in parallel: the image to the Container Registry, and an image tag update to the homelab-values repo. ArgoCD in-cluster watches the values repo, detects the tag change, and syncs to Kubernetes. The dev namespace auto-syncs, prod requires a manual sync gate.</desc>
  <style>
    text { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; }
    .t  { font-size: 14px; fill: #3d3d3a; }
    .ts { font-size: 12px; fill: #73726c; }
    .th { font-size: 14px; font-weight: 500; fill: #3d3d3a; }
    .arr { stroke: #73726c; stroke-width: 1.5; fill: none; }
    .c-gray   > rect { fill: #F1EFE8; stroke: #5F5E5A; }
    .c-gray   > text.th { fill: #444441; }
    .c-gray   > text.ts { fill: #5F5E5A; }
    .c-blue   > rect { fill: #E6F1FB; stroke: #185FA5; }
    .c-blue   > text.th { fill: #0C447C; }
    .c-blue   > text.ts { fill: #185FA5; }
    .c-purple > rect { fill: #EEEDFE; stroke: #534AB7; }
    .c-purple > text.th { fill: #3C3489; }
    .c-purple > text.ts { fill: #534AB7; }
  </style>
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
  </defs>

  <g class="c-gray">
    <rect x="270" y="30" width="140" height="44" rx="8" stroke-width="0.5"/>
    <text class="th" x="340" y="48" text-anchor="middle" dominant-baseline="central">Developer</text>
    <text class="ts" x="340" y="62" text-anchor="middle" dominant-baseline="central">Mac</text>
  </g>

  <line x1="340" y1="74" x2="340" y2="108" class="arr" marker-end="url(#arrow)"/>
  <text class="ts" x="348" y="92" dominant-baseline="central">git push</text>

  <g class="c-blue">
    <rect x="180" y="110" width="320" height="72" rx="8" stroke-width="0.5"/>
    <text class="th" x="340" y="132" text-anchor="middle" dominant-baseline="central">GitLab (ci-1)</text>
    <text class="ts" x="340" y="154" text-anchor="middle" dominant-baseline="central">build → Trivy scan → push</text>
  </g>

  <path d="M 260 182 L 260 210 L 190 210 L 190 240" class="arr" marker-end="url(#arrow)"/>
  <path d="M 420 182 L 420 210 L 520 210 L 520 240" class="arr" marker-end="url(#arrow)"/>

  <g class="c-gray">
    <rect x="70" y="240" width="240" height="66" rx="8" stroke-width="0.5"/>
    <text class="th" x="190" y="264" text-anchor="middle" dominant-baseline="central">homelab-values repo</text>
    <text class="ts" x="190" y="286" text-anchor="middle" dominant-baseline="central">image tag updated by CI</text>
  </g>

  <g class="c-gray">
    <rect x="420" y="240" width="200" height="66" rx="8" stroke-width="0.5"/>
    <text class="th" x="520" y="264" text-anchor="middle" dominant-baseline="central">Container Registry</text>
    <text class="ts" x="520" y="286" text-anchor="middle" dominant-baseline="central">images · on ci-1</text>
  </g>

  <path d="M 190 306 L 190 322 L 340 322 L 340 340" class="arr" marker-end="url(#arrow)"/>
  <text class="ts" x="232" y="316" dominant-baseline="central">watches</text>

  <g class="c-blue">
    <rect x="240" y="340" width="200" height="66" rx="8" stroke-width="0.5"/>
    <text class="th" x="340" y="362" text-anchor="middle" dominant-baseline="central">ArgoCD</text>
    <text class="ts" x="340" y="386" text-anchor="middle" dominant-baseline="central">in-cluster · detects change</text>
  </g>

  <line x1="340" y1="406" x2="340" y2="440" class="arr" marker-end="url(#arrow)"/>
  <text class="ts" x="348" y="423" dominant-baseline="central">sync</text>

  <g class="c-purple">
    <rect x="80" y="440" width="520" height="100" rx="10" stroke-width="0.5"/>
    <text class="th" x="100" y="462" dominant-baseline="central">Kubernetes cluster</text>
  </g>
  <g class="c-gray">
    <rect x="100" y="478" width="230" height="52" rx="6" stroke-width="0.5"/>
    <text class="th" x="215" y="498" text-anchor="middle" dominant-baseline="central">dev namespace</text>
    <text class="ts" x="215" y="516" text-anchor="middle" dominant-baseline="central">auto-sync</text>
  </g>
  <g class="c-gray">
    <rect x="350" y="478" width="230" height="52" rx="6" stroke-width="0.5"/>
    <text class="th" x="465" y="498" text-anchor="middle" dominant-baseline="central">prod namespace</text>
    <text class="ts" x="465" y="516" text-anchor="middle" dominant-baseline="central">manual sync gate</text>
  </g>
</svg>
